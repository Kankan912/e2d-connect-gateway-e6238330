name: Security RLS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  rls-tests:
    name: Run RLS regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_TEST_ANON_EMAIL: ${{ secrets.VITE_TEST_ANON_EMAIL }}
      VITE_TEST_ANON_PASSWORD: ${{ secrets.VITE_TEST_ANON_PASSWORD }}
      VITE_TEST_MEMBER_EMAIL: ${{ secrets.VITE_TEST_MEMBER_EMAIL }}
      VITE_TEST_MEMBER_PASSWORD: ${{ secrets.VITE_TEST_MEMBER_PASSWORD }}
      VITE_TEST_ADMIN_EMAIL: ${{ secrets.VITE_TEST_ADMIN_EMAIL }}
      VITE_TEST_ADMIN_PASSWORD: ${{ secrets.VITE_TEST_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run RLS tests
        run: bun run test:rls
